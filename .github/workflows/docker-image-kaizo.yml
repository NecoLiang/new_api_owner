name: Build & push to Aliyun ACR (kaizo)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'deploy/README.md'
  workflow_dispatch:
    inputs:
      tag:
        description: "additional tag (optional)"
        required: false

jobs:
  build_and_push:
    name: Build linux/amd64 & push to ACR
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Compute version/tag
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u +'%Y%m%d')
          VERSION="kaizo-${DATE}-${SHORT_SHA}"
          echo "$VERSION" > VERSION
          echo "value=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Aliyun ACR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.ACR_REGISTRY }}/kaizo/kaizo_newapi:latest
            ${{ secrets.ACR_REGISTRY }}/kaizo/kaizo_newapi:${{ steps.version.outputs.value }}
            ${{ secrets.ACR_REGISTRY }}/kaizo/kaizo_newapi:sha-${{ steps.version.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Image pushed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ secrets.ACR_REGISTRY }}/kaizo/kaizo_newapi:latest" >> $GITHUB_STEP_SUMMARY
          echo "${{ secrets.ACR_REGISTRY }}/kaizo/kaizo_newapi:${{ steps.version.outputs.value }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Server-side deploy:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "ssh server8 'cd /root/new-api && docker compose pull && docker compose up -d'" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
